<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Ledge — Personal Finance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-base: #FAFAF9;
  --bg-surface: #FFFFFF;
  --text-primary: #0F172A;
  --text-secondary: #64748B;
  --brand: #00A86B;
  --brand-fg: #FFFFFF;
  --success: #16A34A;
  --danger: #DC2626;
  --warning: #D97706;
  --border: #E2E8F0;
  --muted: #F1F5F9;
  --muted-fg: #64748B;
  --card: #FFFFFF;
  --radius: 1.25rem;
  --radius-sm: 0.75rem;
  --sidebar-w: 240px;
}
.dark {
  --bg-base: #0B0F14;
  --bg-surface: #151B23;
  --text-primary: #F1F5F9;
  --text-secondary: #94A3B8;
  --brand: #00C97F;
  --brand-fg: #0B0F14;
  --success: #22C55E;
  --danger: #EF4444;
  --warning: #F59E0B;
  --border: #1E293B;
  --muted: #1E293B;
  --muted-fg: #94A3B8;
  --card: #151B23;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.sidebar-logo{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;margin-bottom:1.5rem}
.logo-icon{width:40px;height:40px;border-radius:.875rem;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:var(--brand-fg);flex-shrink:0}
.logo-text{font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.logo-sub{font-size:.7rem;color:var(--muted-fg)}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;color:var(--muted-fg);cursor:pointer;transition:all .15s;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--muted);color:var(--text-primary)}
.nav-item.active{background:var(--brand);color:var(--brand-fg)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-spacer{flex:1}
.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.dark .topbar{background:rgba(11,15,20,.85)}
.topbar-brand{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1rem}
.topbar-brand .logo-icon{width:32px;height:32px;border-radius:.625rem;font-size:.9rem}
.topbar-right{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.page-content{padding:1.5rem;max-width:1100px;width:100%}
.page{display:none}
.page.active{display:block}
/* Bottom nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;height:60px;align-items:center;justify-content:space-around;padding:0 .5rem;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.5rem .75rem;border-radius:var(--radius-sm);cursor:pointer;color:var(--muted-fg);font-size:.65rem;font-weight:500;transition:color .15s;border:none;background:none;flex:1;min-width:0}
.bottom-nav-item svg{width:20px;height:20px}
.bottom-nav-item.active{color:var(--brand)}
.fab{width:48px;height:48px;border-radius:50%;background:var(--brand);color:var(--brand-fg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,168,107,.4);transition:transform .15s,box-shadow .15s;margin-top:-24px;flex-shrink:0}
.fab:active{transform:scale(.92)}
.fab svg{width:22px;height:22px}
/* Desktop FAB */
.desktop-fab{position:fixed;bottom:2rem;right:2rem;width:52px;height:52px;border-radius:50%;background:var(--brand);color:var(--brand-fg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,168,107,.45);transition:transform .15s;z-index:80}
.desktop-fab:active{transform:scale(.92)}
.desktop-fab svg{width:22px;height:22px}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.hero-card{background:linear-gradient(135deg,rgba(0,168,107,.08) 0%,var(--card) 60%);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem 2rem}
.dark .hero-card{background:linear-gradient(135deg,rgba(0,201,127,.07) 0%,var(--card) 60%)}
/* Grid */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
/* Stat card */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem}
.stat-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between}
.stat-value{font-size:1.2rem;font-weight:700;tabular-nums:true;font-variant-numeric:tabular-nums}
.stat-change{display:flex;align-items:center;gap:3px;font-size:.72rem;font-weight:600}
.stat-change.up{color:var(--success)}
.stat-change.down{color:var(--danger)}
.sparkline{height:28px;display:flex;align-items:flex-end;gap:2px;margin-top:.5rem}
.spark-bar{flex:1;background:rgba(0,168,107,.2);border-radius:2px;min-height:2px;transition:height .3s}
/* Typography */
.page-title{font-size:1.6rem;font-weight:700;color:var(--text-primary)}
.page-sub{color:var(--muted-fg);font-size:.9rem;margin-top:.2rem}
.section-title{font-size:1rem;font-weight:600;color:var(--text-primary)}
.space-y-6>*+*{margin-top:1.5rem}
.space-y-4>*+*{margin-top:1rem}
.space-y-3>*+*{margin-top:.75rem}
.space-y-2>*+*{margin-top:.5rem}
.mt-1{margin-top:.25rem}
.mt-2{margin-top:.5rem}
.mt-4{margin-top:1rem}
.mt-6{margin-top:1.5rem}
.mt-8{margin-top:2rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}
.flex{display:flex}
.items-center{align-items:center}
.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}
.gap-2{gap:.5rem}
.gap-3{gap:.75rem}
.gap-4{gap:1rem}
.flex-1{flex:1}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1rem;border-radius:var(--radius-sm);font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--brand);color:var(--brand-fg)}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text-primary);border:1px solid var(--border)}
.btn-outline:hover{background:var(--muted)}
.btn-ghost{background:transparent;color:var(--text-primary)}
.btn-ghost:hover{background:var(--muted)}
.btn-danger{background:var(--danger);color:#fff}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:var(--radius-sm)}
.btn svg{width:15px;height:15px}
/* Inputs */
.input-group{display:flex;flex-direction:column;gap:.4rem}
.input-label{font-size:.875rem;font-weight:500;color:var(--text-primary)}
.input{width:100%;padding:.65rem .875rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--muted);color:var(--text-primary);font-size:.9rem;outline:none;transition:border .15s}
.input:focus{border-color:var(--brand);background:var(--card)}
.input-big{font-size:2rem;font-weight:700;padding-left:2.5rem;height:3.5rem}
.input-prefix{position:relative}
.input-prefix .prefix{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);font-size:1.3rem;font-weight:600;color:var(--muted-fg);pointer-events:none}
select.input{appearance:none;-webkit-appearance:none;cursor:pointer}
textarea.input{resize:vertical;min-height:80px}
/* Badge */
.badge{display:inline-flex;align-items:center;padding:.25rem .625rem;border-radius:9999px;font-size:.72rem;font-weight:600}
.badge-success{background:rgba(22,163,74,.1);color:var(--success)}
.badge-danger{background:rgba(220,38,38,.1);color:var(--danger)}
.badge-warning{background:rgba(217,119,6,.1);color:var(--warning)}
.badge-blue{background:rgba(59,130,246,.1);color:#3B82F6}
/* Transaction row */
.txn-row{display:flex;align-items:center;gap:.875rem;padding:.875rem 1rem;border-radius:var(--radius-sm);background:var(--muted);transition:background .15s;cursor:pointer}
.txn-row:hover{background:rgba(0,0,0,.05)}
.dark .txn-row:hover{background:rgba(255,255,255,.05)}
.txn-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem}
.txn-icon.income{background:rgba(22,163,74,.15);color:var(--success)}
.txn-icon.expense{background:rgba(220,38,38,.15);color:var(--danger)}
.txn-meta{flex:1;min-width:0}
.txn-cat{font-weight:500;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-sub{font-size:.75rem;color:var(--muted-fg);margin-top:1px}
.txn-amount{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:.9rem}
.txn-amount.income{color:var(--success)}
.txn-amount.expense{color:var(--danger)}
/* Progress */
.progress{height:10px;background:var(--muted);border-radius:9999px;overflow:hidden}
.progress-bar{height:100%;border-radius:9999px;transition:width .5s ease}
.progress-bar.success{background:var(--success)}
.progress-bar.warning{background:var(--warning)}
.progress-bar.danger{background:var(--danger)}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-label{text-align:center;font-size:.72rem;font-weight:600;color:var(--muted-fg);padding:.375rem 0}
.cal-cell{aspect-ratio:1;border-radius:.75rem;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:.8rem;font-weight:500;position:relative}
.cal-cell:hover{border-color:var(--brand);transform:scale(1.05)}
.cal-cell.today{border-color:rgba(0,168,107,.5)}
.cal-cell.selected{border-color:var(--brand);background:rgba(0,168,107,.1)}
.cal-cell.has-income{background:rgba(22,163,74,.12)}
.cal-cell.has-expense{background:rgba(220,38,38,.12)}
.cal-cell.has-both{background:rgba(217,119,6,.12)}
.cal-cell.empty{border-style:dashed;border-color:var(--border)}
.cal-dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:4px}
/* Modal / Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--card);border-radius:1.5rem 1.5rem 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:1.5rem;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom))}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .75rem}
.sheet-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem}
/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.875rem .5rem;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;transition:all .15s;background:none}
.cat-btn:hover{border-color:rgba(0,168,107,.4)}
.cat-btn.selected{border-color:var(--brand);background:rgba(0,168,107,.08)}
.cat-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.cat-name{font-size:.7rem;font-weight:500;color:var(--text-primary);text-align:center;line-height:1.2}
/* Toggle */
.type-toggle{display:flex;gap:.5rem;background:var(--muted);padding:4px;border-radius:var(--radius-sm)}
.type-btn{flex:1;padding:.5rem;border-radius:calc(var(--radius-sm) - 4px);border:none;cursor:pointer;font-size:.875rem;font-weight:500;background:transparent;color:var(--muted-fg);transition:all .15s}
.type-btn.active{background:var(--card);color:var(--text-primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Chart containers */
.chart-wrap{position:relative;width:100%}
.chart-wrap canvas{width:100%!important}
/* Health score */
.health-score-num{font-size:2.5rem;font-weight:700;color:var(--brand)}
.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-top:1.25rem}
.health-cell{text-align:center}
.health-cell-val{font-size:1.1rem;font-weight:700}
.health-cell-label{font-size:.72rem;color:var(--muted-fg);margin-top:2px}
/* Alert */
.alert{border-radius:var(--radius-sm);padding:1rem 1.25rem;display:flex;gap:.875rem;align-items:flex-start}
.alert-warning{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25)}
.alert-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-icon-warning{background:rgba(217,119,6,.15);color:var(--warning)}
/* Asset card */
.asset-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.gain-badge{display:flex;align-items:center;gap:3px;padding:.25rem .5rem;border-radius:9999px;font-size:.72rem;font-weight:600}
.gain-badge.gain{background:rgba(22,163,74,.1);color:var(--success)}
.gain-badge.loss{background:rgba(220,38,38,.1);color:var(--danger)}
/* Subcategory chips */
.chip-row{display:flex;flex-wrap:wrap;gap:.5rem}
.chip{padding:.375rem .875rem;border-radius:9999px;font-size:.8rem;font-weight:500;cursor:pointer;border:none;background:var(--muted);color:var(--muted-fg);transition:all .15s}
.chip.selected{background:var(--brand);color:var(--brand-fg)}
/* Tabs */
.tabs{display:flex;gap:4px;background:var(--muted);padding:4px;border-radius:var(--radius-sm);width:fit-content}
.tab-btn{padding:.4rem .875rem;border-radius:calc(var(--radius-sm) - 4px);border:none;cursor:pointer;font-size:.825rem;font-weight:500;background:transparent;color:var(--muted-fg);transition:all .15s}
.tab-btn.active{background:var(--card);color:var(--text-primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted-fg);font-size:.9rem;gap:.75rem}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Empty state */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted-fg)}
.empty svg{width:48px;height:48px;margin:0 auto .875rem;opacity:.4}
.empty-title{font-size:.95rem;font-weight:500}
.empty-sub{font-size:.8rem;margin-top:.25rem;opacity:.7}
/* Divider */
.divider{height:1px;background:var(--border);margin:1rem 0}
/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .bottom-nav{display:flex}
  .desktop-fab{display:none!important}
  .page-content{padding:1rem;padding-bottom:5rem}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .health-grid{grid-template-columns:repeat(2,1fr)}
  .topbar{display:flex}
  .page-title{font-size:1.3rem}
  .hero-card{padding:1.25rem}
}
@media(min-width:769px){
  .topbar-brand{display:none}
  .topbar{background:transparent;border:none;position:relative;padding:1.5rem 0 0}
  .topbar-right{margin-left:auto}
}
/* Sidebar overlay on mobile */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.sidebar-overlay.open{display:block}
/* Toast */
.toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none}
@media(min-width:769px){.toast-container{bottom:2rem}}
.toast{padding:.6rem 1.1rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;color:#fff;animation:slide-up .25s ease;white-space:nowrap}
.toast-success{background:#16A34A}
.toast-error{background:#DC2626}
@keyframes slide-up{from{transform:translateY(1rem);opacity:0}to{transform:translateY(0);opacity:1}}
/* Inline form (for desktop dialogs) */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.dialog-overlay.open{display:flex}
.dialog{background:var(--card);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.dialog-title{font-size:1.1rem;font-weight:700;margin-bottom:1.25rem}
/* color coding utility */
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-warning{color:var(--warning)}
.text-brand{color:var(--brand)}
.text-muted{color:var(--muted-fg)}
.font-bold{font-weight:700}
.font-semibold{font-weight:600}
.text-sm{font-size:.85rem}
.text-xs{font-size:.75rem}
.text-lg{font-size:1.1rem}
.text-xl{font-size:1.25rem}
.text-2xl{font-size:1.5rem}
.text-3xl{font-size:1.875rem}
.tabular{font-variant-numeric:tabular-nums}
.w-full{width:100%}
.rounded-full{border-radius:9999px}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hidden{display:none}
/* Budget pace warning */
.pace-warn{margin-top:.875rem;padding:.75rem;border-radius:var(--radius-sm);background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.2);font-size:.8rem;color:var(--warning)}
/* Donut center */
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center;pointer-events:none}
/* Net worth bar */
.nw-bar{height:12px;background:var(--muted);border-radius:9999px;overflow:hidden}
.nw-bar-fill{height:100%;background:linear-gradient(90deg,var(--brand),#00e899);border-radius:9999px;transition:width .6s ease}
</style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">L</div>
    <div>
      <div class="logo-text">Ledge</div>
      <div class="logo-sub">Financial Clarity</div>
    </div>
  </div>
  <nav style="display:flex;flex-direction:column;gap:.25rem;flex:1">
    <a class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a class="nav-item" onclick="navigate('calendar')" data-page="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
    </a>
    <a class="nav-item" onclick="navigate('analytics')" data-page="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analytics
    </a>
    <a class="nav-item" onclick="navigate('assets')" data-page="assets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>
      Assets
    </a>
    <a class="nav-item" onclick="navigate('budgets')" data-page="budgets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Budgets
    </a>

<script>
// ============================================================

const SUPABASE_URL = 'https://odcboyzraqwoxvbiusiz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kY2JveXpyYXF3b3h2Yml1c2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjMyMzksImV4cCI6MjA5NzUzOTIzOX0.03txgLofyKod1THoNMMgIJM-ay4mpp7BCHHMNG0ZCFs';

// ============================================================
// STATE
// ============================================================
let state = {
  transactions: [],

  assets: [],

// ============================================================
// CATEGORIES
// ============================================================
const EXPENSE_CATS = [
  {name:'Food & Dining',icon:'🍽️',color:'#EF4444',subs:['Groceries','Restaurants','Delivery']},
  {name:'Transportation',icon:'🚗',color:'#F59E0B',subs:['Fuel','Public Transport','Maintenance']},
  {name:'Shopping',icon:'🛍️',color:'#8B5CF6',subs:['Clothing','Electronics','Home']},
  {name:'Entertainment',icon:'🎬',color:'#EC4899',subs:['Movies','Games','Subscriptions']},
  {name:'Healthcare',icon:'❤️',color:'#06B6D4',subs:['Medical','Pharmacy','Insurance']},
  {name:'Bills & Utilities',icon:'🧾',color:'#10B981',subs:['Electricity','Water','Internet']},
  {name:'Education',icon:'🎓',color:'#3B82F6',subs:['Courses','Books','Tuition']},
  {name:'Personal Care',icon:'✨',color:'#A855F7',subs:['Salon','Cosmetics','Wellness']},
  {name:'Travel',icon:'✈️',color:'#14B8A6',subs:['Flights','Hotels','Activities']},
  {name:'Investments',icon:'📈',color:'#00A86B',subs:['SIP','Stocks','Mutual Funds','Fixed Deposit','PPF']},
  {name:'Other',icon:'💰',color:'#6B7280',subs:[]},
];
const INCOME_CATS = [
  {name:'Salary',icon:'💵',color:'#00A86B',subs:[]},
  {name:'Freelance',icon:'💼',color:'#3B82F6',subs:[]},
  {name:'Business',icon:'🏪',color:'#8B5CF6',subs:[]},
  {name:'Investments',icon:'📈',color:'#10B981',subs:[]},
  {name:'Other',icon:'👛',color:'#6B7280',subs:[]},
];
const INVEST_SUBS = ['SIP','Stocks','Mutual Funds','Fixed Deposit','PPF'];

// ============================================================
// UTILS
// ============================================================
function fmt(paise){
  const r = paise/100;
  return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',minimumFractionDigits:0,maximumFractionDigits:0}).format(r);
}
function fmtDate(d){return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function monthStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function todayStr(){return new Date().toISOString().split('T')[0]}
function nowTime(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}
function isInvestment(cat){return cat==='Investments'||INVEST_SUBS.includes(cat)}

function getMonthTxns(txns,date){
  const m=monthStr(date);
  return txns.filter(t=>t.date&&t.date.startsWith(m));
}
function calcIncome(date){
  const m=monthStr(date);
  const mi=state.monthlyIncomes.find(i=>i.month===m);
  const salary=mi?mi.amount:0;
  const extra=getMonthTxns(state.transactions,date).filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  return salary+extra;
}
function calcExpenses(date){
  return getMonthTxns(state.transactions,date).filter(t=>t.type==='expense'&&!isInvestment(t.category)).reduce((s,t)=>s+t.amount,0);
}
function calcBalance(date){return calcIncome(date)-calcExpenses(date)}
function calcSavingsRate(date){const i=calcIncome(date);return i===0?0:Math.max(0,(calcBalance(date)/i)*100)}

function catInfo(name,type='expense'){
  const cats=type==='income'?INCOME_CATS:EXPENSE_CATS;
  return cats.find(c=>c.name===name)||{icon:'💰',color:'#6B7280',name};
}

// ============================================================
// SUPABASE OPS
// ============================================================
async function loadData(){
  try{
    const [txRes,incRes,assRes,libRes,budRes]=await Promise.all([
      sb.from('transactions').select('*').order('date',{ascending:false}).order('time',{ascending:false}),
      sb.from('monthly_incomes').select('*'),
      sb.from('assets').select('*'),
      sb.from('liabilities').select('*'),
      sb.from('budgets').select('*'),
    ]);
    if(txRes.data) state.transactions=txRes.data;
    if(incRes.data) state.monthlyIncomes=incRes.data;
    if(assRes.data) state.assets=assRes.data;
    if(libRes.data) state.liabilities=libRes.data;
    if(budRes.data) state.budgets=budRes.data;
  }catch(e){console.error('Load error',e);toast('Failed to load data','error')}
}

async function insertTxn(t){
  const{data,error}=await sb.from('transactions').insert([t]).select().single();
  if(error)throw error;
  state.transactions.unshift(data);
  return data;
}
async function deleteTxn(id){
  const{error}=await sb.from('transactions').delete().eq('id',id);
  if(error)throw error;
  state.transactions=state.transactions.filter(t=>t.id!==id);
}
async function upsertIncome(inc){
  const{data,error}=await sb.from('monthly_incomes').upsert([inc],{onConflict:'month'}).select().single();
  if(error)throw error;
  const idx=state.monthlyIncomes.findIndex(i=>i.month===inc.month);
  if(idx>-1)state.monthlyIncomes[idx]=data; else state.monthlyIncomes.push(data);
}
async function insertAsset(a){
  const{data,error}=await sb.from('assets').insert([a]).select().single();
  if(error)throw error;
  state.assets.push(data);
}
async function updateAsset(id,a){
  const{data,error}=await sb.from('assets').update(a).eq('id',id).select().single();
  if(error)throw error;
  const idx=state.assets.findIndex(x=>x.id===id);
  if(idx>-1)state.assets[idx]=data;
}
async function deleteAsset(id){
  const{error}=await sb.from('assets').delete().eq('id',id);
  if(error)throw error;
  state.assets=state.assets.filter(a=>a.id!==id);
}
async function insertLiability(l){
  const{data,error}=await sb.from('liabilities').insert([l]).select().single();
  if(error)throw error;
  state.liabilities.push(data);
}
async function deleteLiability(id){
  const{error}=await sb.from('liabilities').delete().eq('id',id);
  if(error)throw error;
  state.liabilities=state.liabilities.filter(l=>l.id!==id);
}
async function upsertBudget(b){
  const{data,error}=await sb.from('budgets').upsert([b],{onConflict:'category'}).select().single();
  if(error)throw error;
  const idx=state.budgets.findIndex(x=>x.category===b.category);
  if(idx>-1)state.budgets[idx]=data; else state.budgets.push(data);
}
async function deleteBudget(cat){
  const{error}=await sb.from('budgets').delete().eq('category',cat);
  if(error)throw error;
  state.budgets=state.budgets.filter(b=>b.category!==cat);
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll(`[data-page="${page}"]`).forEach(n=>n.classList.add('active'));
  state.currentPage=page;
  closeSidebar();
  setTimeout(()=>renderPage(page),50);
}
function renderPage(page){
  if(page==='dashboard')renderDashboard();
  else if(page==='calendar')renderCalendar();
  else if(page==='analytics')renderAnalytics();
  else if(page==='assets')renderAssets();
  else if(page==='budgets')renderBudgets();
  else if(page==='settings')renderSettings();
}

// ============================================================
// TOAST
// ============================================================
function toast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.textContent=msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ============================================================
// THEME
// ============================================================
function toggleTheme(){
  state.theme=state.theme==='dark'?'light':'dark';
  applyTheme();
  localStorage.setItem('ledge_theme',state.theme);
}
function applyTheme(){
  document.documentElement.classList.toggle('dark',state.theme==='dark');
  document.getElementById('themeIconLight').style.display=state.theme==='dark'?'none':'block';
  document.getElementById('themeIconDark').style.display=state.theme==='dark'?'block':'none';
  // Re-render charts for dark mode
  Object.values(state.charts).forEach(c=>c&&c.destroy&&c.destroy());
  state.charts={};
  renderPage(state.currentPage);
}

function renderCatGrid(){

  const g=document.getElementById('catGrid');
  g.innerHTML=cats.map(c=>`
    <button class="cat-btn${state.txnCategory===c.name?' selected':''}" onclick="selectCat('${c.name}')">
      <div class="cat-icon" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
      <span class="cat-name">${c.name.split(' ')[0]}</span>
    </button>`).join('');
  renderSubcats();
}
function selectCat(name){
  state.txnCategory=name;
  state.txnSubcategory='';
  renderCatGrid();
}
function renderSubcats(){
  const cats=state.txnType==='income'?INCOME_CATS:EXPENSE_CATS;
  const cat=cats.find(c=>c.name===state.txnCategory);
  const grp=document.getElementById('subcatGroup');
  const chips=document.getElementById('subcatChips');
  if(cat&&cat.subs&&cat.subs.length>0){
    grp.style.display='block';
    chips.innerHTML=cat.subs.map(s=>`<button class="chip${state.txnSubcategory===s?' selected':''}" onclick="selectSubcat('${s}')">${s}</button>`).join('');
  } else {
    grp.style.display='none';
  }
}
function selectSubcat(s){
  state.txnSubcategory=state.txnSubcategory===s?'':s;
  renderSubcats();
}
function formatAmount(el){
  let v=el.value.replace(/[^\d.]/g,'');
  const pts=v.split('.');
  if(pts.length>2)v=pts[0]+'.'+pts[1];
  else if(pts[1]&&pts[1].length>2)v=pts[0]+'.'+pts[1].slice(0,2);
  el.value=v;
}
async function saveTxn(){
  const amt=parseFloat(document.getElementById('txnAmount').value);
  if(!amt||amt<=0){toast('Enter a valid amount','error');return}
  if(!state.txnCategory){toast('Select a category','error');return}
  const t={
    type:state.txnType,
    amount:Math.round(amt*100),
    category:state.txnCategory,
    subcategory:state.txnSubcategory||null,
    date:document.getElementById('txnDate').value,
    time:document.getElementById('txnTime').value,
    notes:document.getElementById('txnNotes').value||null,
  };
  try{
    await insertTxn(t);
    closeDialog('addTxnOverlay');
    toast(`${t.type==='expense'?'Expense':'Income'} saved!`);
    renderPage(state.currentPage);
  }catch(e){toast('Failed to save','error');console.error(e)}
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(){
  const d=state.currentMonth;
  const income=calcIncome(d);
  const expenses=calcExpenses(d);
  const balance=calcBalance(d);
  const savRate=calcSavingsRate(d);

  // prev month
  const pd=new Date(d.getFullYear(),d.getMonth()-1,1);
  const pInc=calcIncome(pd),pExp=calcExpenses(pd),pBal=calcBalance(pd),pSav=calcSavingsRate(pd);
  const chg=(cur,prev)=>prev===0?null:((cur-prev)/Math.abs(prev)*100);
  const iChg=chg(income,pInc),eChg=chg(expenses,pExp),bChg=chg(balance,pBal),sChg=chg(savRate,pSav);

  // Forecast
  const now=new Date();
  const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const curDay=d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()?now.getDate():daysInMonth;
  const last14=state.transactions.filter(t=>{
    const diff=(now-new Date(t.date))/(1000*60*60*24);
    return diff<=14&&t.type==='expense';
  });
  const avgDaily=last14.reduce((s,t)=>s+t.amount,0)/14;
  const remDays=daysInMonth-curDay;
  const projBalance=balance-avgDaily*remDays;
  const willOver=projBalance<0&&remDays>0;

  // Health Score
  const savingsScore=Math.min((savRate/30)*100,100);
  const last30=state.transactions.filter(t=>(now-new Date(t.date))/(86400000)<=30);
  const dailySpends=Array.from({length:30},(_,i)=>{
    const dd=new Date(now);dd.setDate(dd.getDate()-i);
    const ds=last30.filter(t=>t.date===dd.toISOString().split('T')[0]&&t.type==='expense');
    return ds.reduce((s,t)=>s+t.amount,0);
  });
  const mean=dailySpends.reduce((s,v)=>s+v,0)/30;
  const variance=dailySpends.reduce((s,v)=>s+Math.pow(v-mean,2),0)/30;
  const stdDev=Math.sqrt(variance);
  const consistencyScore=mean>0?Math.max(0,100-Math.min((stdDev/mean)*100,100)):100;
  const monthlyInv=getMonthTxns(state.transactions,d).filter(t=>t.type==='expense'&&isInvestment(t.category)).reduce((s,t)=>s+t.amount,0);
  const invRatio=income>0?(monthlyInv/income)*100:0;
  const invScore=Math.min((invRatio/20)*100,100);
  const daysLogged=new Set(last30.map(t=>t.date)).size;
  const logScore=(daysLogged/30)*100;
  const healthScore=Math.round(savingsScore*.4+consistencyScore*.25+invScore*.2+logScore*.15);
  const band=healthScore>=90?'Excellent':healthScore>=75?'Good':healthScore>=50?'Fair':'Needs Attention';
  const bandColor=healthScore>=75?'var(--success)':healthScore>=50?'var(--warning)':'var(--danger)';

  // Recent transactions
  const recent=[...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||'')).slice(0,6);

  // Sparklines (last 7 days)
  const spark=(type)=>Array.from({length:7},(_,i)=>{const dd=new Date(now);dd.setDate(dd.getDate()-(6-i));const ds=todayStr(),dstr=dd.toISOString().split('T')[0];return state.transactions.filter(t=>t.date===dstr&&t.type===type).reduce((s,t)=>s+t.amount,0)});
  const incSpark=spark('income'),expSpark=spark('expense');

  const chgBadge=(c,inv=false)=>{
    if(c===null)return '<span class="stat-change" style="color:var(--warning)">✦ New</span>';
    const up=inv?(c<0):(c>=0);
    return `<span class="stat-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(c).toFixed(1)}%</span>`;
  };
  const sparkHTML=(data,color)=>{
    const max=Math.max(...data,1);
    return `<div class="sparkline">${data.map(v=>`<div class="spark-bar" style="height:${Math.max((v/max)*100,v>0?8:0)}%;background:${color}33"></div>`).join('')}</div>`;
  };

  document.getElementById('dashContent').innerHTML=`
  <div class="flex items-center justify-between">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">${d.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-outline btn-icon" onclick="changeMonth(-1)" title="Previous month">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="btn btn-outline" onclick="resetMonth()">Today</button>
      <button class="btn btn-outline btn-icon" onclick="changeMonth(1)" title="Next month">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div class="hero-card">
    <p class="text-xs font-semibold" style="text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);margin-bottom:.5rem">Available Balance</p>
    <div style="font-size:2.5rem;font-weight:700;font-variant-numeric:tabular-nums;color:${balance>=0?'var(--text-primary)':'var(--danger)'}">${fmt(balance)}</div>
    ${bChg!==null?`<div class="mt-1 text-sm" style="color:${bChg>=0?'var(--success)':'var(--danger)'}">${bChg>=0?'▲':'▼'} ${Math.abs(bChg).toFixed(1)}% from last month</div>`:''}
    <button class="btn btn-outline mt-4" style="font-size:.8rem" onclick="openIncomeDialog()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
      Set Monthly Income
    </button>
  </div>

  <div class="grid-4">
    <div class="stat-card">
      <div class="stat-label">Income ${chgBadge(iChg)}</div>
      <div class="stat-value text-success">${fmt(income)}</div>
      ${sparkHTML(incSpark,'#16A34A')}
    </div>
    <div class="stat-card">
      <div class="stat-label">Expenses ${chgBadge(eChg,true)}</div>
      <div class="stat-value text-danger">${fmt(expenses)}</div>
      ${sparkHTML(expSpark,'#DC2626')}
    </div>
    <div class="stat-card">
      <div class="stat-label">Savings ${chgBadge(bChg)}</div>
      <div class="stat-value text-brand">${fmt(balance)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Savings Rate ${chgBadge(sChg)}</div>
      <div class="stat-value">${savRate.toFixed(1)}%</div>
    </div>
  </div>

  ${willOver?`<div class="alert alert-warning">
    <div class="alert-icon alert-icon-warning">⚠️</div>
    <div>
      <div class="font-semibold text-sm">Spending Alert</div>
      <div class="text-sm text-muted mt-1">At ${fmt(Math.round(avgDaily))}/day pace, you're projected to overspend by ${fmt(Math.round(avgDaily*remDays-balance))} with ${remDays} days left.</div>
    </div>
  </div>`:''}

  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="section-title">Financial Health</div>
        <div class="text-sm text-muted mt-1">${band}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:2rem;font-weight:700;color:${bandColor}">${healthScore}</div>
        <div class="text-xs text-muted">/100</div>
      </div>
    </div>
    <div class="progress"><div class="progress-bar" style="width:${healthScore}%;background:${bandColor}"></div></div>
    <div class="health-grid">
      <div class="health-cell"><div class="health-cell-val">${savRate.toFixed(1)}%</div><div class="health-cell-label">Savings Rate</div></div>
      <div class="health-cell"><div class="health-cell-val">${Math.round(consistencyScore)}</div><div class="health-cell-label">Consistency</div></div>
      <div class="health-cell"><div class="health-cell-val">${invRatio.toFixed(1)}%</div><div class="health-cell-label">Invested</div></div>
      <div class="health-cell"><div class="health-cell-val">${daysLogged}/30</div><div class="health-cell-label">Log Days</div></div>
    </div>
  </div>

  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <div class="section-title">Recent Transactions</div>
      <button class="btn btn-ghost btn-icon" onclick="navigate('calendar')" title="View all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    ${recent.length===0?`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><div class="empty-title">No transactions yet</div><div class="empty-sub">Tap + to add your first</div></div>`
    :recent.map(t=>`
      <div class="txn-row" style="margin-bottom:.5rem" onclick="confirmDeleteTxn('${t.id}','${t.category}')">
        <div class="txn-icon ${t.type}">${catInfo(t.category,t.type).icon}</div>
        <div class="txn-meta">
          <div class="txn-cat">${t.category}</div>
          <div class="txn-sub">${t.subcategory?t.subcategory+' · ':''}${fmtDate(t.date)}</div>
        </div>
        <div class="txn-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
      </div>`).join('')}
  </div>`;
}

function changeMonth(d){
  state.currentMonth=new Date(state.currentMonth.getFullYear(),state.currentMonth.getMonth()+d,1);
  renderDashboard();
}
function resetMonth(){state.currentMonth=new Date();renderDashboard()}

async function confirmDeleteTxn(id,cat){
  if(!confirm(`Delete "${cat}" transaction?`))return;
  try{await deleteTxn(id);toast('Deleted');renderPage(state.currentPage)}
  catch(e){toast('Failed to delete','error')}
}

function renderCalendar(){
  const d=state.currentMonth;
  const ms=new Date(d.getFullYear(),d.getMonth(),1);
  const me=new Date(d.getFullYear(),d.getMonth()+1,0);
  const startDow=ms.getDay();
  const today=new Date();

  const selTxns=state.selectedCalDate
    ?state.transactions.filter(t=>t.date===state.selectedCalDate)
    :[];

  const dayStats=(dateStr)=>{
    const txns=state.transactions.filter(t=>t.date===dateStr);
    const inc=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return{inc,exp,has:txns.length>0};
  };

  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div></div>`;
  for(let day=1;day<=me.getDate();day++){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const st=dayStats(ds);
    const isToday=today.getDate()===day&&today.getMonth()===d.getMonth()&&today.getFullYear()===d.getFullYear();
    const isSel=state.selectedCalDate===ds;
    let cls='cal-cell';
    if(!st.has)cls+=' empty';
    else if(st.inc>0&&st.exp===0)cls+=' has-income';
    else if(st.exp>0&&st.inc===0)cls+=' has-expense';
    else if(st.inc>0&&st.exp>0)cls+=' has-both';
    if(isToday)cls+=' today';
    if(isSel)cls+=' selected';
    cells+=`<button class="${cls}" onclick="selectCalDay('${ds}')">${day}</button>`;
  }

  document.getElementById('calContent').innerHTML=`
  <div class="space-y-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="page-title">Calendar</h1>
        <p class="page-sub">${d.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-icon" onclick="changeCalMonth(-1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="btn btn-outline" onclick="resetCalMonth()">Today</button>
        <button class="btn btn-outline btn-icon" onclick="changeCalMonth(1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <div class="card">
      <div class="cal-grid mb-2">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    ${state.selectedCalDate?`
    <div class="card">
      <div class="flex items-center justify-between mb-4">
        <div class="section-title">${fmtDate(state.selectedCalDate)}</div>
        <div class="flex gap-2">
          ${selTxns.length>0?`<span class="badge badge-blue">${selTxns.length} txn${selTxns.length!==1?'s':''}</span>`:''}
        </div>
      </div>
      ${selTxns.length===0?`<div class="empty" style="padding:1.5rem 0"><div class="empty-title">No transactions</div></div>`
      :selTxns.map(t=>`
        <div class="txn-row" style="margin-bottom:.5rem" onclick="confirmDeleteTxn('${t.id}','${t.category}')">
          <div class="txn-icon ${t.type}">${catInfo(t.category,t.type).icon}</div>
          <div class="txn-meta">
            <div class="txn-cat">${t.category}${t.subcategory?' · '+t.subcategory:''}</div>
            <div class="txn-sub">${t.time||''}${t.notes?' · '+t.notes:''}</div>
          </div>
          <div class="txn-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        </div>`).join('')}
    </div>`:''}
  </div>`;
}
function selectCalDay(ds){
  state.selectedCalDate=state.selectedCalDate===ds?null:ds;
  renderCalendar();
}
function changeCalMonth(d){
  state.currentMonth=new Date(state.currentMonth.getFullYear(),state.currentMonth.getMonth()+d,1);
  state.selectedCalDate=null;
  renderCalendar();
}
function resetCalMonth(){state.currentMonth=new Date();state.selectedCalDate=null;renderCalendar()}

let analyticsTab='monthly';
function renderAnalytics(){
  document.getElementById('analyticsContent').innerHTML=`
  <div class="space-y-6">
    <div>
      <h1 class="page-title">Analytics</h1>
      <p class="page-sub">Spending patterns & trends</p>
    </div>
    <div class="tabs">
      <button class="tab-btn${analyticsTab==='monthly'?' active':''}" onclick="switchAnalyticsTab('monthly')">Monthly</button>
      <button class="tab-btn${analyticsTab==='yearly'?' active':''}" onclick="switchAnalyticsTab('yearly')">Yearly</button>
      <button class="tab-btn${analyticsTab==='daily'?' active':''}" onclick="switchAnalyticsTab('daily')">Daily</button>
    </div>
    <div id="analyticsTabContent"></div>
  </div>`;

}
function switchAnalyticsTab(tab){analyticsTab=tab;renderAnalytics()}
function renderAnalyticsTab(){
  const d=new Date();
  if(analyticsTab==='monthly')renderMonthlyAnalytics(d);
  else if(analyticsTab==='yearly')renderYearlyAnalytics(d);
  else if(analyticsTab==='daily')renderDailyAnalytics(d);
}

function renderMonthlyAnalytics(d){
  // Category breakdown
  const monthTxns=getMonthTxns(state.transactions,d).filter(t=>t.type==='expense');
  const catMap={};
  monthTxns.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});
  const breakdown=Object.entries(catMap).map(([cat,amt])=>({cat,amt,info:catInfo(cat,'expense')})).sort((a,b)=>b.amt-a.amt);
  const total=breakdown.reduce((s,x)=>s+x.amt,0);

  // Cash flow (daily this month)
  const daysInM=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const flowData=Array.from({length:daysInM},(_,i)=>{
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
    const txns=state.transactions.filter(t=>t.date===ds);
    const inc=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0)/100;
    const exp=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)/100;
    return{day:i+1,inc,exp};
  });

  document.getElementById('analyticsTabContent').innerHTML=`
  <div class="space-y-6">
    <div class="card">
      <div class="section-title mb-6">Spending by Category — ${d.toLocaleDateString('en-IN',{month:'long'})}</div>
      ${breakdown.length===0?`<div class="empty"><div class="empty-title">No expenses this month</div></div>`:`
      <div style="display:grid;grid-template-columns:1fr;gap:1.5rem">
        <div style="max-width:280px;margin:0 auto;width:100%">
          <div class="donut-wrap" style="height:220px">
            <canvas id="donutChart"></canvas>
            <div class="donut-center" style="pointer-events:none">
              <div class="text-xs text-muted">Total</div>
              <div class="font-bold" style="font-size:.9rem">${fmt(total)}</div>
            </div>
          </div>
        </div>
        <div class="space-y-2">
          ${breakdown.map(x=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;border-radius:.625rem;background:var(--muted)">
            <div style="display:flex;align-items:center;gap:.625rem">
              <div style="width:12px;height:12px;border-radius:3px;background:${x.info.color};flex-shrink:0"></div>
              <span style="font-size:.875rem;font-weight:500">${x.cat}</span>
            </div>
            <div style="text-align:right">
              <div style="font-size:.875rem;font-weight:700;font-variant-numeric:tabular-nums">${fmt(x.amt)}</div>
              <div class="text-xs text-muted">${total>0?((x.amt/total)*100).toFixed(1):0}%</div>
            </div>
          </div>`).join('')}
        </div>
      </div>`}
    </div>
    <div class="card">
      <div class="section-title mb-4">Daily Cash Flow</div>
      <div class="chart-wrap" style="height:220px"><canvas id="flowChart"></canvas></div>
    </div>
  </div>`;

  if(breakdown.length>0){
    requestAnimationFrame(()=>{
      const isDark=state.theme==='dark';
      const gridColor=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
      const labelColor=isDark?'#94A3B8':'#64748B';
      // Donut
      const dc=document.getElementById('donutChart');
      if(dc){
        if(state.charts.donut)state.charts.donut.destroy();
        state.charts.donut=new Chart(dc.getContext('2d'),{
          type:'doughnut',
          data:{labels:breakdown.map(x=>x.cat),datasets:[{data:breakdown.map(x=>x.amt/100),backgroundColor:breakdown.map(x=>x.info.color),borderWidth:2,borderColor:isDark?'#151B23':'#fff',hoverOffset:6}]},
          options:{cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw*100)}`}}},responsive:true,maintainAspectRatio:false}
        });
      }
      // Flow
      const fc=document.getElementById('flowChart');
      if(fc){
        if(state.charts.flow)state.charts.flow.destroy();
        state.charts.flow=new Chart(fc.getContext('2d'),{
          type:'bar',
          data:{labels:flowData.map(x=>x.day),datasets:[
            {label:'Income',data:flowData.map(x=>x.inc),backgroundColor:'rgba(22,163,74,.7)',borderRadius:4},
            {label:'Expense',data:flowData.map(x=>x.exp),backgroundColor:'rgba(220,38,38,.7)',borderRadius:4},
          ]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:labelColor,font:{size:11}}}},scales:{x:{ticks:{color:labelColor,font:{size:10},maxTicksLimit:10},grid:{color:gridColor}},y:{ticks:{color:labelColor,font:{size:10},callback:v=>`₹${v>=1000?Math.round(v/1000)+'k':v}`},grid:{color:gridColor}}}}
        });
      }
    });
  }
}

function renderDailyAnalytics(d){

  const days=Array.from({length:30},(_,i)=>{
    const dd=new Date(d);dd.setDate(dd.getDate()-(29-i));

      label:`${dd.getDate()}/${dd.getMonth()+1}`,

async function saveAsset(){
  const type=document.getElementById('assetType').value||'Other';
  const name=document.getElementById('assetName').value.trim();

  const cb=parseFloat(document.getElementById('assetCost').value);
  if(!name||isNaN(cv)||isNaN(cb)){toast('Fill all fields','error');return}
  const obj={type,name,current_value:Math.round(cv*100),cost_basis:Math.round(cb*100),last_updated:new Date().toISOString()};

function renderBudgets(){
  const now=new Date();
  const daysInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const curDay=now.getDate();
  const expectedPacePct=(curDay/daysInM)*100;

  const budgetRows=state.budgets.map(b=>{
    const spent=getMonthTxns(state.transactions,now)
      .filter(t=>t.type==='expense'&&t.category===b.category)
      .reduce((s,t)=>s+t.amount,0);
    const pct=b.monthly_limit>0?(spent/b.monthly_limit)*100:0;
    const rem=b.monthly_limit-spent;
    const pace=expectedPacePct>0?pct/expectedPacePct:0;
    let status='success',statusLabel='On Track';
    if(spent>b.monthly_limit){status='danger';statusLabel='Over Budget'}
    else if(pace>1.1){status='warning';statusLabel='At Risk'}
    const ci=catInfo(b.category,'expense');
    return{...b,spent,pct,rem,pace,status,statusLabel,ci};
  });

  // Available categories for adding budgets
  const usedCats=state.budgets.map(b=>b.category);
  const availCats=EXPENSE_CATS.filter(c=>!usedCats.includes(c.name));

  document.getElementById('budgetsContent').innerHTML=`
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="page-title">Budgets</h1>
        <p class="page-sub">Monthly spending limits</p>
      </div>
      <button class="btn btn-primary" onclick="openBudgetDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Set Budget
      </button>
    </div>

    ${state.budgets.length===0?`<div class="card"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><div class="empty-title">No budgets set</div><div class="empty-sub">Set spending limits per category</div></div></div>`
    :`<div class="grid-2">
      ${budgetRows.map(b=>`
      <div class="card">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-2">
            <div class="txn-icon" style="background:${b.ci.color}22;color:${b.ci.color}">${b.ci.icon}</div>
            <div>
              <div class="font-semibold text-sm">${b.category}</div>
              <div class="text-xs text-muted">${fmt(b.spent)} of ${fmt(b.monthly_limit)}</div>
            </div>
          </div>
          <div class="flex gap-2 items-center">
            <span class="badge badge-${b.status}">${b.statusLabel}</span>
            <button class="btn btn-ghost btn-icon" style="width:24px;height:24px;font-size:.8rem" onclick="confirmDeleteBudget('${b.category}')">✕</button>
          </div>
        </div>
        <div class="progress"><div class="progress-bar ${b.status}" style="width:${Math.min(b.pct,100)}%"></div></div>
        <div class="flex justify-between mt-2 text-xs">
          <span class="text-muted">${b.pct.toFixed(1)}% used</span>
          <span class="${b.rem>=0?'text-success':'text-danger'}">${b.rem>=0?fmt(b.rem)+' left':fmt(Math.abs(b.rem))+' over'}</span>
        </div>
        ${b.status==='warning'?`<div class="pace-warn">⚠️ Spending ${(b.pace*100).toFixed(0)}% faster than expected for this point in the month</div>`:''}
      </div>`).join('')}
      </div>`}
  </div>`;
}

function openBudgetDialog(){
  const usedCats=state.budgets.map(b=>b.category);
  const availCats=EXPENSE_CATS.filter(c=>!usedCats.includes(c.name));
  const sel=document.getElementById('budgetCategory');
